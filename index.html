<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Info Banner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        /* Grundinställningar - nu anpassningsbara */
        body {
            margin: 0;
            padding: 0;
            width: 100vw; /* Använder 100% av view-width */
            background-color: #000000; 
            font-family: 'Inter', sans-serif;
            overflow-x: hidden; /* Förhindrar horisontell scroll */
        }

        #banner {
            width: 100%;
            height: 110px;
            background: transparent;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 4%; /* Använder procent för padding så det skalar */
            box-sizing: border-box;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            position: fixed; /* Låser bannern högst upp */
            top: 0;
            left: 0;
        }

        .info-group {
            display: flex;
            align-items: center;
            gap: 20px;
            min-width: 0; /* Förhindrar overflow i flexbox */
        }

        #time-container {
            display: flex;
            align-items: center;
            font-size: clamp(32px, 4vw, 52px); /* Texten skalar mellan 32px och 52px beroende på skärm */
            font-weight: 700;
            letter-spacing: -1px;
            white-space: nowrap;
        }

        #date {
            font-size: clamp(16px, 1.5vw, 22px); /* Skalbar text för datum */
            font-weight: 300;
            color: #ffffff;
            padding-left: 20px;
            border-left: 1px solid rgba(255, 255, 255, 0.2);
            height: 30px;
            display: flex;
            align-items: center;
            white-space: nowrap;
        }

        .weather-wrapper {
            flex-shrink: 1;
            min-width: 400px;
            max-width: 400px;
            /* Vi tar bort 'scale' här eftersom det kan trycka ut widgeten utanför kanten på mindre skärmar */
        }

        /* Om skärmen är väldigt smal (t.ex. stående läge), dölj datum för att få plats */
        @media (max-width: 800px) {
            #date { display: none; }
        }
    </style>
</head>
<body>

    <div id="banner">
        <div class="info-group">
            <div id="time-container">
                <span id="hour">00</span><span class="separator">:</span><span id="min">00</span>
            </div>        
            <div id="date">Laddar datum...</div>
        </div>
        
        <div class="weather-wrapper">
<a class="weatherwidget-io" href="https://forecast7.com/sv/59d3318d07/stockholm/" data-label_1="STOCKHOLM" data-label_2="WEATHER" data-icons="Climacons Animated" data-mode="Current" data-theme="dark" data-basecolor="" >STOCKHOLM WEATHER</a>
<script>
!function(d,s,id){var js,fjs=d.getElementsByTagName(s)[0];if(!d.getElementById(id)){js=d.createElement(s);js.id=id;js.src='https://weatherwidget.io/js/widget.min.js';fjs.parentNode.insertBefore(js,fjs);}}(document,'script','weatherwidget-io-js');
</script>
        </div>
    </div>

    <script>
        function updateClock() {
            const now = new Date();
            const days = ['Söndag', 'Måndag', 'Tisdag', 'Onsdag', 'Torsdag', 'Fredag', 'Lördag'];
            const months = ['januari', 'februari', 'mars', 'april', 'maj', 'juni', 'juli', 'augusti', 'september', 'oktober', 'november', 'december'];
            
            document.getElementById('hour').textContent = now.getHours().toString().padStart(2, '0');
            document.getElementById('min').textContent = now.getMinutes().toString().padStart(2, '0');
            
            const dateText = `${days[now.getDay()]} ${now.getDate()} ${months[now.getMonth()]}`;
            document.getElementById('date').textContent = dateText;
        }
        
        setInterval(updateClock, 1000);
        updateClock();
    </script>
</body>
</html>
